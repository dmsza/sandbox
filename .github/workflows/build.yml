name: Build helloworld

on:
  push:
    paths-ignore:
      - 'builds/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            cc: gcc
            output: helloworld
            dest: builds/linux/x64
          - target: aarch64-linux
            cc: aarch64-linux-gnu-gcc
            output: helloworld
            dest: builds/linux/aarch64
          - target: x86_64-windows
            cc: x86_64-w64-mingw32-gcc
            output: helloworld.exe
            dest: builds/windows/x64

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64

      - name: Build
        run: ${{ matrix.cc }} helloworld.c -o ${{ matrix.output }}

      - name: Package and publish
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
          ZIPNAME="${{ matrix.output }}_${TIMESTAMP}.zip"
          DESTDIR="${{ matrix.dest }}"

          mkdir -p "$DESTDIR"
          zip "$DESTDIR/$ZIPNAME" "${{ matrix.output }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase origin ${{ github.ref_name }}
          git add "$DESTDIR/$ZIPNAME"
          git commit -m "build: publish $ZIPNAME to $DESTDIR"
          git push origin ${{ github.ref_name }}
